<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB37A" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#FF7A3D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF5C28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFCF4"/>
      <stop offset="100%" stop-color="#EFE0C6"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFCF4"/>
      <stop offset="100%" stop-color="#E5D2B0"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7A7A"/>
      <stop offset="55%" stop-color="#E53E3E"/>
      <stop offset="100%" stop-color="#B12525"/>
    </linearGradient>
    <radialGradient id="heartShine" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- warm radial glow -->
  <rect width="64" height="64" fill="url(#glow)"/>

  <!-- envelope body with soft shadow -->
  <g filter="url(#soft)">
    <rect x="11" y="20" width="42" height="28" rx="2.5" fill="#1a1a22" opacity="0.18"/>
  </g>
  <rect x="11" y="20" width="42" height="28" rx="2.5" fill="url(#env)"/>

  <!-- back flap fold lines -->
  <path d="M11.5 20.5 L32 35 L52.5 20.5" fill="none" stroke="#C9B68F" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- bottom fold lines -->
  <path d="M11.5 47.5 L24 36 M52.5 47.5 L40 36" fill="none" stroke="#D9C8A6" stroke-width="0.6"/>

  <!-- closed top flap (subtle, sits behind heart) -->
  <path d="M11 21.5 L32 34 L53 21.5 L53 22.5 L32 35 L11 22.5 Z" fill="url(#flap)" opacity="0.85"/>

  <!-- heart -->
  <g>
    <path d="M32 42.5
             C25.5 37, 21 33, 21 28.5
             C21 25.6, 23.3 23.4, 26 23.4
             C28.4 23.4, 30.6 24.9, 32 27
             C33.4 24.9, 35.6 23.4, 38 23.4
             C40.7 23.4, 43 25.6, 43 28.5
             C43 33, 38.5 37, 32 42.5 Z"
          fill="url(#heart)"
          stroke="#8B1A1A" stroke-width="0.5"/>
    <path d="M27 26
             C25.5 26, 24 27.5, 24 29
             C24 30, 24.5 31, 25.5 32"
          fill="none" stroke="url(#heartShine)" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
